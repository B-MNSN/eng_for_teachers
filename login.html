<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Kanit", Arial, sans-serif;
            background: rgb(123,146,190);
            background: radial-gradient(circle, rgba(123,146,190,1) 0%, rgba(231,235,240,1) 100%);  
        }


        .login-container {
            background: rgb(255 255 255 / 85%);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 500px;
            backdrop-filter: blur(10px);
        }

        .head_signin {
            text-align: center;
        }

        .icon {
            font-size: 50px;
            color: #333;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .input-container {
            position: relative;
            margin: 1rem 0;
        }

        .input-container label {
            font-size: 0.95rem;
            font-weight: 400;
        }

        .input-container i {
            position: absolute;
            left: 15px;
            top: 65%;
            transform: translateY(-20%);
            color: #aaa;
        }

        .input-field {
            width: 100%;
            padding: 12px 40px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
            margin: 0.5rem 0 0;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;

        }

        .login-btn:hover {
            background: #333;
        }

        .box-login-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0 1.5rem;
        }

        .box-login-icon .box-icon {
            background: #fff;
            padding: 0.5rem 1.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 10px 0;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 2px dotted #ccc;
        }
        .divider:not(:empty)::before {
            margin-right: .5em;
        }
        .divider:not(:empty)::after {
            margin-left: .5em;
        }
        .validate {
            display: none;
            color: red;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }
        .validate.show::before {
            content: "\f06a ";
            font-family: "FontAwesome";
            font-weight: 900;
            color: red;
            margin-right: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="head_signin">
            <i class="fas fa-sign-in-alt icon"></i>
            <h2>Sign in</h2>
            <span>Please enter your details to sign in <br>English integeted working in daily life of teachers</span>
        </div>
        <div class="input-container">
            <i class="fas fa-envelope"></i>
            <label for="signin_username">Username</label>
            <input type="text" class="input-field" id="signin_username" placeholder="Username">
        </div>
        <div class="input-container">
            <i class="fas fa-lock"></i>
            <label for="signin_pass">Password</label>
            <input type="password" class="input-field" id="signin_pass" placeholder="Password">
        </div>
        <span class="validate" id="validateText"></span>
        <!-- <div class="divider">Or sign in with</div>
        <div class="box-login-icon">
            <div class="box-icon">
                <i class="fa-brands fa-google"></i>
                Google
            </div>
        </div> -->
        <button class="login-btn" id="btnLogin" onclick="checkLogin()">Sign in</button>
    </div>


    <script src="./index.js"></script>
</body>
</html>
